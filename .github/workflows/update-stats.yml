# =============================================
# GitHub Stats Auto-Updater
# Fetches GitHub API data on a schedule and
# saves it as a static JSON file for the website.
# =============================================

name: Update GitHub Stats

on:
  schedule:
    # Run every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GitHub Stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = 'Gary-nope';

            // Fetch user profile
            const { data: user } = await github.rest.users.getByUsername({ username });

            // Fetch repos (up to 100, sorted by most recently updated)
            const { data: repos } = await github.rest.repos.listForUser({
              username,
              per_page: 100,
              sort: 'updated',
              direction: 'desc',
            });

            const totalStars = repos.reduce((sum, r) => sum + (r.stargazers_count || 0), 0);

            const projects = repos
              .filter(r => !r.fork)
              .slice(0, 6)
              .map(r => ({
                name: r.name,
                description: r.description || 'No description',
                html_url: r.html_url,
                language: r.language || '',
                stars: r.stargazers_count || 0,
              }));

            const data = {
              stats: {
                public_repos: user.public_repos || 0,
                followers: user.followers || 0,
                following: user.following || 0,
                stars: totalStars,
              },
              projects,
              updated_at: new Date().toISOString(),
            };

            fs.writeFileSync('data/github-stats.json', JSON.stringify(data, null, 2));
            console.log('✅ GitHub stats updated:', JSON.stringify(data.stats));
            console.log('📦 Projects:', projects.map(p => p.name).join(', '));

      - name: Download contribution heatmap
        run: |
          curl -fsSL -o data/heatmap.svg "https://ghchart.rshah.org/006d32/Gary-nope" || echo '⚠️ Heatmap download failed, keeping previous version'

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: auto-update GitHub stats" && git pull --rebase origin main && git push origin HEAD:main)

